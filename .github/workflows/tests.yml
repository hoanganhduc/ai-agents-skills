name: Installer Tests

on:
  pull_request:
    paths:
      - ".github/workflows/tests.yml"
      - ".github/workflows/docs.yml"
      - "Makefile"
      - "make.bat"
      - "README.md"
      - "docs/**"
      - "installer/**"
      - "tests/**"
      - "tools/**"
      - "manifest/**"
      - "canonical/**"
      - "targets/**"
      - "pyproject.toml"
      - "docs/requirements.txt"
  push:
    paths:
      - ".github/workflows/tests.yml"
      - ".github/workflows/docs.yml"
      - "Makefile"
      - "make.bat"
      - "README.md"
      - "docs/**"
      - "installer/**"
      - "tests/**"
      - "tools/**"
      - "manifest/**"
      - "canonical/**"
      - "targets/**"
      - "pyproject.toml"
      - "docs/requirements.txt"

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run sanitizer checks
        run: make sanitize-check

      - name: Run static checks
        run: make static-check

      - name: Run unit tests
        run: make test

      - name: Install runtime smoke dependencies
        run: python -m pip install networkx psutil

      - name: Run runtime smoke
        run: make runtime-smoke

      - name: Verify generated docs are current
        run: make docs-check

      - name: Build docs site
        run: |
          python -m pip install -r docs/requirements.txt
          make docs-site

      - name: Run fake-root lifecycle matrix
        run: make lifecycle-test ARGS="--matrix stress --platform-shape all"

  linux-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install real Chromium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Capture and verify against file:// fixtures (network forbidden)
        env:
          RUNTIME: canonical/runtime/skills/url-to-screenshot-runtime
          FIXTURES: canonical/runtime/skills/url-to-screenshot-runtime/u2s/htmlfixtures
        run: |
          set -euo pipefail
          export URL_TO_SCREENSHOT_BROWSER="$(command -v chrome || command -v google-chrome || command -v chromium)"
          echo "browser: $URL_TO_SCREENSHOT_BROWSER"
          OUT="$RUNNER_TEMP/u2s-capture"
          mkdir -p "$OUT"

          # Golden page captures and verifies (file:// fixtures need --allow-file-urls).
          python "$RUNTIME/url_to_screenshot_runtime.py" capture --allow-file-urls --no-sandbox --engine cdp \
            --url "file://$PWD/$FIXTURES/plain.html" --out "$OUT/plain.png" --consent off
          python "$RUNTIME/url_to_screenshot_runtime.py" verify --png "$OUT/plain.png" | tee "$OUT/plain.verify.json"
          python -c "import json,sys; d=json.load(open('$OUT/plain.verify.json')); sys.exit(0 if d['final_verdict']=='VERIFIED' else 1)"

          # Consent removal does not blank the page (still VERIFIED after removal).
          python "$RUNTIME/url_to_screenshot_runtime.py" capture --allow-file-urls --no-sandbox --engine cdp \
            --url "file://$PWD/$FIXTURES/consent.html" --out "$OUT/consent.png" --consent on
          python "$RUNTIME/url_to_screenshot_runtime.py" verify --png "$OUT/consent.png" | tee "$OUT/consent.verify.json"
          python -c "import json,sys; d=json.load(open('$OUT/consent.verify.json')); sys.exit(0 if d['final_verdict']=='VERIFIED' else 1)"

          # Full-page (tall.html) height exceeds the 800px viewport.
          python "$RUNTIME/url_to_screenshot_runtime.py" capture --allow-file-urls --no-sandbox --engine cdp \
            --url "file://$PWD/$FIXTURES/tall.html" --out "$OUT/tall.png" --full-page --consent off
          python "$RUNTIME/url_to_screenshot_runtime.py" verify --png "$OUT/tall.png" | tee "$OUT/tall.verify.json"
          python -c "import json,sys; d=json.load(open('$OUT/tall.verify.json')); h=d['detail']['height']; print('full-page height',h); sys.exit(0 if d['final_verdict']=='VERIFIED' and h>800 else 1)"

          # slow.html with --timeout 1 yields BLOCKED_TIMEOUT with the process tree reaped:
          # no leftover url2png_* temp dir and no child Chromium PID remain.
          TMP_BASE="${TMPDIR:-/tmp}"
          before_pids="$(pgrep -c -x chrome 2>/dev/null || true):$(pgrep -c -x chromium 2>/dev/null || true)"
          set +e
          python "$RUNTIME/url_to_screenshot_runtime.py" capture --allow-file-urls --no-sandbox --engine cdp \
            --url "file://$PWD/$FIXTURES/slow.html" --out "$OUT/slow.png" --timeout 1 --consent off | tee "$OUT/slow.json"
          rc=$?
          set -e
          test "$rc" -ne 0 || (echo "expected nonzero exit on --timeout 1" && exit 1)
          python -c "import json,sys; d=json.load(open('$OUT/slow.json')); sys.exit(0 if d.get('status')=='BLOCKED_TIMEOUT' else 1)"
          sleep 3
          test -z "$(ls -d "$TMP_BASE"/url2png_* 2>/dev/null || true)" || (echo "leftover url2png_* temp dir" && exit 1)
          test -z "$(ls -d /tmp/url2png_* 2>/dev/null || true)" || (echo "leftover /tmp/url2png_* temp dir" && exit 1)
          after_chrome="$(pgrep -c -x chrome 2>/dev/null || true)"
          after_chromium="$(pgrep -c -x chromium 2>/dev/null || true)"
          echo "chromium pids before=$before_pids after chrome=$after_chrome chromium=$after_chromium"
          test "${after_chrome:-0}" = "0" || (echo "leftover chrome child PID after reap" && exit 1)
          test "${after_chromium:-0}" = "0" || (echo "leftover chromium child PID after reap" && exit 1)

      - name: Print and structurally verify PDF fixtures
        run: |
          export URL_TO_SCREENSHOT_BROWSER="$(command -v chrome || command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser)"
          test -n "$URL_TO_SCREENSHOT_BROWSER"
          python -m unittest -v tests/test_url_to_pdf_runtime.py -k ChromiumPdfFixtureTests

  python-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python compatibility dependencies
        run: python -m pip install 'tomli>=2; python_version < "3.11"'

      - name: Run sanitizer checks
        run: make sanitize-check

      - name: Run static checks
        run: make static-check

      - name: Run unit tests
        run: make test

      - name: Verify generated docs are current
        run: make docs-check

  macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run sanitizer checks
        run: make sanitize-check

      - name: Run static checks
        run: make static-check

      - name: Run unit tests
        run: make test

      - name: Install runtime smoke dependencies
        run: python -m pip install networkx psutil

      - name: Run runtime smoke
        run: make runtime-smoke

      - name: Verify generated docs are current
        run: make docs-check

      - name: Run platform lifecycle smoke
        run: make lifecycle-test ARGS="--matrix default --platform-shape macos"

      - name: Run Antigravity-only lifecycle smoke
        run: make lifecycle-test ARGS="--scenario antigravity-only-auto --platform-shape macos"

  windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check command help
        shell: cmd
        run: make.bat help

      - name: List artifacts
        shell: cmd
        run: make.bat list-artifacts

      - name: Check make.bat propagates command failures
        shell: cmd
        run: |
          call make.bat definitely-not-a-command
          if not errorlevel 1 exit /b 1
          exit /b 0

      - name: Run sanitizer checks
        shell: cmd
        run: make.bat sanitize-check

      - name: Run static checks
        shell: cmd
        run: make.bat static-check

      - name: Run unit tests
        shell: cmd
        run: make.bat test

      - name: Install runtime smoke dependencies
        shell: cmd
        run: python -m pip install networkx psutil

      - name: Run runtime smoke
        shell: cmd
        run: make.bat runtime-smoke

      - name: Verify generated docs are current
        shell: cmd
        run: make.bat docs-check

      - name: Run platform lifecycle smoke
        shell: cmd
        run: make.bat lifecycle-test --matrix default --platform-shape windows

      - name: Run Antigravity-only lifecycle smoke
        shell: cmd
        run: make.bat lifecycle-test --scenario antigravity-only-auto --platform-shape windows
