name: Installer Tests

on:
  pull_request:
    paths:
      - ".github/workflows/tests.yml"
      - ".github/workflows/docs.yml"
      - "Makefile"
      - "make.bat"
      - "README.md"
      - "docs/**"
      - "installer/**"
      - "tests/**"
      - "tools/**"
      - "manifest/**"
      - "canonical/**"
      - "targets/**"
      - "pyproject.toml"
      - "docs/requirements.txt"
  push:
    paths:
      - ".github/workflows/tests.yml"
      - ".github/workflows/docs.yml"
      - "Makefile"
      - "make.bat"
      - "README.md"
      - "docs/**"
      - "installer/**"
      - "tests/**"
      - "tools/**"
      - "manifest/**"
      - "canonical/**"
      - "targets/**"
      - "pyproject.toml"
      - "docs/requirements.txt"

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sanitizer checks
        run: make sanitize-check

      - name: Run static checks
        run: make static-check

      - name: Run unit tests
        run: make test

      - name: Install runtime smoke dependencies
        run: python -m pip install networkx psutil

      - name: Run runtime smoke
        run: make runtime-smoke

      - name: Verify generated docs are current
        run: make docs-check

      - name: Build docs site
        run: |
          python -m pip install -r docs/requirements.txt
          make docs-site

      - name: Run fake-root lifecycle matrix
        run: make lifecycle-test ARGS="--matrix stress --platform-shape all"

  python-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run sanitizer checks
        run: make sanitize-check

      - name: Run static checks
        run: make static-check

      - name: Run unit tests
        run: make test

      - name: Verify generated docs are current
        run: make docs-check

  macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sanitizer checks
        run: make sanitize-check

      - name: Run static checks
        run: make static-check

      - name: Run unit tests
        run: make test

      - name: Install runtime smoke dependencies
        run: python -m pip install networkx psutil

      - name: Run runtime smoke
        run: make runtime-smoke

      - name: Verify generated docs are current
        run: make docs-check

      - name: Run platform lifecycle smoke
        run: make lifecycle-test ARGS="--matrix default --platform-shape macos"

  windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check command help
        shell: cmd
        run: make.bat help

      - name: List artifacts
        shell: cmd
        run: make.bat list-artifacts

      - name: Check make.bat propagates command failures
        shell: cmd
        run: |
          call make.bat definitely-not-a-command
          if not errorlevel 1 exit /b 1
          exit /b 0

      - name: Run sanitizer checks
        shell: cmd
        run: make.bat sanitize-check

      - name: Run static checks
        shell: cmd
        run: make.bat static-check

      - name: Run unit tests
        shell: cmd
        run: make.bat test

      - name: Install runtime smoke dependencies
        shell: cmd
        run: python -m pip install networkx psutil

      - name: Run runtime smoke
        shell: cmd
        run: make.bat runtime-smoke

      - name: Verify generated docs are current
        shell: cmd
        run: make.bat docs-check

      - name: Run platform lifecycle smoke
        shell: cmd
        run: make.bat lifecycle-test --matrix default --platform-shape windows
