{
  "schema_version": 1,
  "tools": {
    "python-runtime": {
      "description": "Python runtime with venv, pip, and ssl support.",
      "version_constraint": ">=3.10",
      "candidates": {
        "linux": [
          "${AAS_PYTHON}",
          "./.venv/bin/python",
          "~/.codex/.venv/bin/python",
          "~/.claude/.venv/bin/python",
          "python3",
          "python"
        ],
        "windows": [
          "%AAS_PYTHON%",
          ".codex\\.venv\\Scripts\\python.exe",
          ".claude\\.venv\\Scripts\\python.exe",
          ".venv\\Scripts\\python.exe",
          "C:\\Python3*\\python.exe",
          "%LOCALAPPDATA%\\Programs\\Python\\Python3*\\python.exe",
          "%PROGRAMFILES%\\Python3*\\python.exe",
          "%PROGRAMFILES(X86)%\\Python3*\\python.exe",
          "%WINDIR%\\py.exe",
          "py -3",
          "python.exe",
          "python"
        ]
      },
      "capabilities": ["venv", "pip", "ssl"]
    },
    "powershell-runtime": {
      "description": "PowerShell runtime for Windows bootstrap and argument forwarding.",
      "version_constraint": ">=5.1",
      "candidates": {
        "windows": ["pwsh", "powershell.exe"]
      },
      "capabilities": ["script-execution", "utf8-output"]
    },
    "node-runtime": {
      "description": "Node runtime for MCP servers that use npx.",
      "version_constraint": ">=18",
      "candidates": {
        "linux": ["node"],
        "windows": ["node.exe", "node"]
      },
      "capabilities": ["npm"]
    },
    "wsl-runtime": {
      "description": "Windows Subsystem for Linux runtime.",
      "version_constraint": ">=2",
      "candidates": {
        "windows": ["wsl.exe", "wsl"]
      },
      "capabilities": ["distro-list", "command-exec"]
    },
    "sage-runtime": {
      "description": "SageMath runtime, local on Linux or WSL-backed on Windows.",
      "version_constraint": ">=10.0",
      "candidates": {
        "linux": ["${AAS_SAGE}", "sage", "~/sage/sage", "~/sage/src/bin/sage", "~/sage-10.4/sage"],
        "windows": [
          "%AAS_SAGE%",
          "wsl:sage",
          "wsl:~/sage/sage",
          "wsl:~/sage/src/bin/sage",
          "wsl:~/sage-10.4/sage",
          "wsl-local:${AAS_SAGE}",
          "wsl-local:sage",
          "wsl-local:~/sage/sage",
          "wsl-local:~/sage/src/bin/sage",
          "wsl-local:~/sage-*/*/sage",
          "wsl-local:~/sage-*/sage",
          "wsl-local:/usr/bin/sage",
          "wsl-local:/usr/local/bin/sage",
          "wsl-local:/opt/sage*/sage",
          "wsl-rootfs:%LOCALAPPDATA%\\Packages\\*\\LocalState\\rootfs\\usr\\bin\\sage",
          "wsl-rootfs:%LOCALAPPDATA%\\Packages\\*\\LocalState\\rootfs\\home\\*\\sage\\sage",
          "wsl-rootfs:%LOCALAPPDATA%\\Packages\\*\\LocalState\\rootfs\\home\\*\\sage\\src\\bin\\sage",
          "wsl-rootfs:%LOCALAPPDATA%\\Packages\\*\\LocalState\\rootfs\\home\\*\\sage-*\\sage",
          "wsl-vhdx:%LOCALAPPDATA%\\Packages\\*\\LocalState\\ext4.vhdx"
        ]
      },
      "capabilities": ["graph-theory", "algebra"]
    },
    "tex-runtime": {
