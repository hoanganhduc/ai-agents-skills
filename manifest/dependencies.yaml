          "%LOCALAPPDATA%\\Programs\\MiKTeX\\miktex\\bin\\x64\\lualatex.exe",
          "%LOCALAPPDATA%\\Programs\\MiKTeX\\miktex\\bin\\x64\\xelatex.exe",
          "%LOCALAPPDATA%\\Programs\\MiKTeX\\miktex\\bin\\pdflatex.exe",
          "%LOCALAPPDATA%\\Programs\\MiKTeX\\miktex\\bin\\lualatex.exe",
          "%LOCALAPPDATA%\\Programs\\MiKTeX\\miktex\\bin\\xelatex.exe",
          "pdflatex.exe",
          "lualatex.exe",
          "xelatex.exe"
