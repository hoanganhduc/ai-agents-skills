install_id = "example-install"
platform = "linux"
broker_state_root = "../../memories/research-compute"
default_materialize_root = ".research-compute"
modal_profile = "default"
modal_environment = "main"
deployment_alias = "research-compute-codex"
allowed_gpu_families = ["T4", "L4", "A10", "A100", "H100"]
per_job_cost_cap_usd = 5.0
default_archive_backend = "local"

# Automatic backend order. The planner takes the first feasible, within-budget
# backend. A custom order must keep "local" exactly once and first; the supported
# remote lanes may then be reordered or omitted, but not duplicated. Naming a backend
# in a job's policy ("local"|"kaggle"|"modal"|"hetzner"|"gha") overrides the order.
# `doctor` warns on deviations and identifies invalid orders; automatic planning
# rejects an invalid order rather than falling open to an unlisted lane.
# Kaggle sits right behind local: its CPU compute is free and does NOT consume the
# GPU quota, so a CPU job that fits Kaggle's constraints is preferred over the
# paid/quota'd lanes (Modal, Hetzner, GHA).
routing_order = ["local", "kaggle", "modal", "hetzner", "gha"]
# Router-wide GPU policy (plan §5.1). A job is GPU-requested when the estimate
# auto-signals GPU (a GPU task-family/type marker or an explicit gpu resource_class)
# OR the job explicitly requests it (policy.gpu / constraints.gpu) -- an explicit
# request ALWAYS wins, even if auto-detection says CPU. A GPU-requested job walks
# routing_order for the first GPU-capable + available lane: local (only if the box
# has a GPU) -> Kaggle (free GPU under the weekly GPU-hour self-cap) -> Modal (paid
# on-demand GPU workhorse); Hetzner has no on-demand GPU and is skipped; GitHub
# Actions GPU is opt-in ([gha].gpu_enabled, off).
# Optional Modal monthly spend cap (USD). 0 = rely on per_job_cost_cap_usd only.
modal_monthly_budget_usd = 0.0

[functions]
modal_cpu = "run_cpu_job"
modal_highmem_cpu = "run_highmem_job"
modal_gpu = "run_gpu_job"
modal_sandbox_experimental = "run_sandbox_job"

[defaults]
auto_submit = true
wait_poll_seconds = 5

# ---------------------------------------------------------------------------
# GitHub Actions ToS compliance. GitHub's Additional Product Terms restrict
# Actions on GitHub-hosted runners to "the production, testing, deployment, or
# publication of the software project associated with the repository," and forbid
# disproportionate / serverless burden. In this broker, Actions compute runs ONLY
# inside a private research repo, executes that repo's own committed experiment
# code (parameters are DATA, never executed), as that project's own validation,
# budget-gated and kept proportionate, and is the LAST automatic backend (after
# local, Kaggle, Modal, and Hetzner) -- never a general compute pool. Source:
# GitHub Terms for Additional Products and Features -> GitHub Actions.
# ---------------------------------------------------------------------------
[gha]
enabled = false             # off until a classic PAT (billing-read + user scope) is set and `doctor` passes
included_minutes = 0        # 0 = auto-detect from the account plan
max_usage_fraction = 0.60   # GHA is available only while cumulative account-wide minutes
                            # used this cycle + the job worst-case stay <= this fraction of
                            # included_minutes -- reserving 40% for the user's other workflows
gpu_enabled = false         # GPU on GitHub Actions requires PAID "larger runners"
                            # (Team/Enterprise; not free minutes, not public repos), so it is
                            # opt-in and OFF by default. When on, the GHA lane is GPU-capable
                            # for GPU-requested jobs (still under max_usage_fraction).

# One block per private research repo that carries an in-repo experiment.yml.
# The broker sends only parameters (data); it never sends code.
# [gha.repos.my_experiments]
# repo = "owner/PrivateResearchRepo"   # MUST be private
# ref = "main"
# workflow = "experiment.yml"
# runtime = "python"                   # python | sage | cpp
# experiment = "my_sweep"
# runner_os = "linux"                  # exact: linux/ubuntu 1x, windows 2x, macos 10x
# timeout_minutes = 30                  # admission also checks core_hours / requested width
# max_cpu = 2                           # bounds both cpu and parallelism; declare larger runners
# max_memory_mb = 7168                  # conservative standard private Linux runner envelope
# monthly_minute_budget = <minutes>   # optional per-repo cap

# ---------------------------------------------------------------------------
# Local-lane self-preservation veto (plan §5). Before choosing the local lane the
# planner projects the full-run load and pins a safe worker count; a runtime
# watchdog aborts and re-routes if the load breaches the ceiling mid-run. All
# thresholds are fractions of the logical core count N. Conservative defaults;
# calibrate to this host's measured auto-restart point.
# ---------------------------------------------------------------------------
[local]
danger_load_frac = 0.5        # w_safe = floor(danger_load_frac*N - loadavg - session_headroom_frac*N)
session_headroom_frac = 0.15  # reserve headroom for the interactive session itself
soft = 0.4                    # soft breach (fraction of N): shed a worker
hard = 0.55                   # hard breach (fraction of N): checkpoint + abort + fall back
local_wall_budget_h = 2.0     # a local run must finish within this budget or it offloads

# ---------------------------------------------------------------------------
# Hetzner Cloud lane (peer to Kaggle / Modal / GitHub Actions; the offload tier after Modal
# for non-GPU work). Agents drive the full lifecycle (provision -> run -> collect ->
# DESTROY) under hard cost caps. A powered-off server still bills -- only DELETE
# stops it -- so teardown must run on every terminal path. GPU work is out of
# scope in v1, so the router skips Hetzner and continues to the next GPU-capable
# lane. Disabled until HCLOUD_TOKEN (from a dedicated least-privilege Hetzner
# project) is set and `doctor` passes.
# ---------------------------------------------------------------------------
[hetzner]
enabled = false               # off until HCLOUD_TOKEN is present and `doctor` passes
location = "nbg1"             # default provisioning location; preflight availability-checks the
                             # live datacenter list and picks an orderable location from the allow-list
allowed_locations = ["nbg1", "hel1", "sin"]  # current orderable regions (fsn1 has no orderable types)
image = "ubuntu-24.04"
monthly_eur_cap = 0.0         # 0 = rely on the per-job / per-day caps only
max_eur_per_job = 3.0         # auto-approve envelope: worst-case <= EUR 3/job (larger needs human confirm)
max_eur_per_day = 3.0         # append-only day ledger halts provisioning at this cap
max_server_hours = 6.0        # dead-man's-switch TTL; worst-case reservation = rate x ceil(hours) x count + IPv4
max_concurrent_servers = 2    # the Hetzner project server-limit enforces this too
gpu_server_types = []         # empty in v1: GPU work skips Hetzner

# Server rate card (approximate public Hetzner Cloud list prices in EUR/hour, current
# orderable x86 generation; override per account). The router picks the cheapest adequate
# type -- CPX22 (2 cores) for small jobs, CPX62 (16 AMD cores) for <=16-way, else CCX63
# (48 dedicated cores). ARM cax* is supply-constrained and omitted. wall_h = core_h / vcpu.
[hetzner.server_types.cpx22]
vcpu = 2
ram_gb = 4
arch = "x86"
eur_per_hour = 0.0180

[hetzner.server_types.cpx62]
vcpu = 16
ram_gb = 32
arch = "x86"
eur_per_hour = 0.1550

[hetzner.server_types.ccx63]
vcpu = 48
ram_gb = 192
arch = "x86"
eur_per_hour = 1.3678

# ---------------------------------------------------------------------------
# Kaggle Kernels lane (peer to Modal / Hetzner / GitHub Actions; the FIRST offload
# tier after local). Kaggle runs async kernels (push a script + kernel-metadata,
# poll status, download output), each capped at a 12h session on ~4 vCPU / ~32 GB.
# CPU sessions are FREE and do NOT consume the weekly ~30h GPU quota, so CPU jobs are
# ungated by quota (limited only by the 12h/session and concurrency caps). Kaggle has
# no clean quota API, so GPU usage is bounded by a self-imposed weekly GPU-hour cap
# read from a local usage ledger. Kernels auto-stop at 12h and cost nothing, so there
# is NO cost gate, NO reaper, and NO teardown. A job longer than 12h spans multiple
# kernel runs (push a chunk -> download checkpoints -> re-push to resume). Auth is the
# new single Kaggle API token supplied via the KAGGLE_API_TOKEN environment variable (or
# ~/.kaggle/access_token) -- NOT the legacy KAGGLE_USERNAME + KAGGLE_KEY pair or a
# kaggle.json. kagglehub (>=0.4.1) validates the token and the kaggle CLI (>=1.8.0) runs
# the kernel ops. Disabled until KAGGLE_API_TOKEN is set in the environment and `doctor`
# passes. ToS: keep to modest, legitimate research workloads; verify the current Kaggle
# terms permit this use before the first live run (the build makes no live Kaggle calls).
# ---------------------------------------------------------------------------
[kaggle]
enabled = false              # off until KAGGLE_API_TOKEN is present and `doctor` passes
weekly_gpu_hours_cap = 18.0  # self-imposed weekly GPU-hour cap (a local ledger; ~60% of the ~30h
                             # floating quota, mirroring the GHA 60% idea). CPU work is ungated.
max_runs = 5                 # safety bound on the multi-run resume loop (rounds per job)
concurrency = 5              # max concurrent kernels (Kaggle's concurrent-session limit is ~5)
session_hours = 12.0         # Kaggle's hard per-kernel session cap (CPU and GPU)
kernel_cores = 4             # per-kernel vCPU (free tier) -- drives the #runs estimate
kernel_ram_gb = 32.0         # per-kernel RAM (free tier) -- a job over this is inadequate

# ---------------------------------------------------------------------------
# Multi-backend parallel fan-out (v2). Fan-out is a SCHEDULER ON TOP of the
# per-lane probes/drivers: it splits ONE large divisible job (M independent,
# resumable chunks) across SEVERAL lanes AT ONCE -- some chunks local, some free
# (Kaggle), some paid (Hetzner/Modal) -- each lane sized to its spare capacity, to
# minimise makespan (time until every chunk is back) while minimising cost. Small
# jobs keep using the single-lane router; fan-out is opt-in and only for large
# divisible jobs (declared chunk count >= min_chunks). The allocator water-fills
# chunks by cost-efficiency (free/cheap lanes first) and balances finish-times,
# minimising  speed_cost_weight * norm(makespan) + (1 - speed_cost_weight) *
# norm(cost). speed_cost_weight in [0,1] is the per-job knob (0 = cheapest / free
# lanes only, accept slower; 1 = fastest / recruit paid lanes; 0.5 = blend);
# job policy.speed_cost_weight overrides this default. The per-core-hour rates,
# per-eur rate, and startup latencies feed ONLY the objective -- the HARD RAILS
# (per-lane budget caps, the EUR3/day auto-approve envelope, the GitHub Actions
# 60% cumulative-minutes cap, Kaggle's weekly GPU-hour quota, and local's
# self-preservation load-cap) are enforced as per-lane chunk ceilings that a
# speed-leaning knob can never breach. Local (Oracle Cloud) is NOT free -- its
# per-core-hour cost enters the model; Kaggle is the free lane.
# ---------------------------------------------------------------------------
[fanout]
enabled = false              # off by default; opt-in for large divisible batch jobs
speed_cost_weight = 0.5      # default objective knob (0 cheapest .. 1 fastest); per-job overridable
min_chunks = 8               # below this many chunks, use the single-lane router instead
usd_per_eur = 1.08           # normalise Hetzner EUR into the objective's USD cost term
local_usd_per_core_hour = 0.006   # local Oracle box is NOT free; its cost enters the objective
modal_usd_per_core_hour = 0.10    # Modal remote CPU per-core-hour (objective cost only)
modal_slots = 16             # Modal parallel width used for makespan estimation
gha_slots = 20               # GitHub Actions matrix parallel width for makespan estimation
local_startup_seconds = 5.0       # fixed per-lane startup latency before the first result
kaggle_startup_seconds = 300.0    # Kaggle kernels queue/start latency
modal_startup_seconds = 45.0
hetzner_startup_seconds = 180.0   # provision + boot latency
gha_startup_seconds = 60.0        # Actions runner queue latency
